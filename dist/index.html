<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goody POS - Landing</title>
    <script type="module" crossorigin src="/goodyapps/assets/index-CHK_xnwX.js?v=20260412a"></script>
    <link rel="stylesheet" crossorigin href="/goodyapps/assets/index-B8lxjJ8G.css?v=20260412a">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var projectBase = '/goodyapps/';

        function patchHomeLink() {
          var homeLink = document.querySelector('a[aria-label="Go to home"]');
          if (!homeLink) return;

          homeLink.setAttribute('href', projectBase);
          homeLink.addEventListener('click', function (event) {
            event.preventDefault();
            if (window.location.pathname.indexOf(projectBase) === 0) {
              window.scrollTo({ top: 0, behavior: 'smooth' });
              return;
            }
            window.location.assign(projectBase);
          });
        }

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', patchHomeLink);
        } else {
          patchHomeLink();
        }
      })();
    </script>
  </body>
</html>
