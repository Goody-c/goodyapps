<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goody POS - Landing</title>
    <script type="module" crossorigin src="/goodyapps/assets/index-CHK_xnwX.js?v=20260412a"></script>
    <link rel="stylesheet" crossorigin href="/goodyapps/assets/index-B8lxjJ8G.css?v=20260412a">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var projectBase = '/goodyapps/';

        function routeToProjectHome(event) {
          var target = event.target;
          if (!target || !target.closest) return;

          var homeLink = target.closest('a[aria-label="Go to home"]');
          if (!homeLink) return;

          event.preventDefault();
          if (window.location.pathname.indexOf(projectBase) === 0) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
          }
          window.location.assign(projectBase);
        }

        function patchHomeLinks() {
          var links = document.querySelectorAll('a[aria-label="Go to home"]');
          if (!links.length) return;

          links.forEach(function (link) {
            link.setAttribute('href', projectBase);
          });
        }

        function setupObservers() {
          var root = document.getElementById('root');
          if (!root || typeof MutationObserver === 'undefined') return;

          var observer = new MutationObserver(function () {
            patchHomeLinks();
          });

          observer.observe(root, { childList: true, subtree: true });
        }

        document.addEventListener('click', routeToProjectHome, true);
        patchHomeLinks();
        setupObservers();

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', patchHomeLinks);
        } else {
          patchHomeLinks();
        }
      })();
    </script>
  </body>
</html>
