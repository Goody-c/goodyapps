    <style>
      /* ===================================================================
         GOODY POS LANDING — UNIFIED DARK NAVY THEME  v2
         Navy base + Emerald accent · dot-grid · gradient h1 · CTA pulse
         =================================================================== */

      /* ===== Design tokens ===== */
      :root {
        --g-bg:        #0b1120;
        --g-surface:   #141d2e;
        --g-card:      #1a2540;
        --g-border:    #263352;
        --g-accent:    #10b981;
        --g-accent-dk: #059669;
        --g-text:      #f1f5f9;
        --g-text-sub:  #cbd5e1;
        --g-text-mute: #94a3b8;
        --g-amber:     #fbbf24;
      }

      /* ===== Keyframes ===== */
      @keyframes goody-glow-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0),   0 4px 14px -4px rgba(16,185,129,0.45); }
        50%       { box-shadow: 0 0 0 9px rgba(16,185,129,0), 0 4px 22px -2px rgba(16,185,129,0.65); }
      }

      @keyframes goody-fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0);   }
      }

      /* Marquee scroll */
      @keyframes goody-marquee {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      /* Stats number count-up shimmer */
      @keyframes goody-stat-shimmer {
        0%   { background-position: -200% center; }
        100% { background-position:  200% center; }
      }

      /* ===== Base ===== */
      :root,
      html,
      body {
        color-scheme: light !important;
        background: var(--g-bg) !important;
        min-height: 100%;
      }

      /* Dot-grid texture — sits behind everything via a fixed pseudo */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
        background-size: 28px 28px;
        pointer-events: none;
        z-index: 0;
      }

      /* Root above the dot grid */
      #root { position: relative; z-index: 1; }

      /* Make the React root transparent so body bg shows */
      /* Also force .force-light-landing visible — React sets display:none via
         inline style when data-theme="dark" is on root; CSS !important wins */
      #root > div,
      .force-light-landing,
      [class*="bg-[#fbf9f4]"],
      [class*="bg-\\[\\#fbf9f4\\]"] {
        background: transparent !important;
      }
      .force-light-landing {
        display: block !important;
      }

      /* ===== Background overrides — all on navy palette ===== */
      #root .bg-white            { background-color: var(--g-card)    !important; }
      #root .bg-slate-50         { background-color: var(--g-surface)  !important; }
      #root .bg-slate-100        { background-color: var(--g-card)     !important; }
      #root .bg-slate-200        { background-color: var(--g-surface)  !important; }
      #root .bg-slate-800        { background-color: #0d1526           !important; }
      #root .bg-slate-900        { background-color: var(--g-bg)       !important; }
      #root [class*="bg-white/"] { background-color: rgba(26,37,64,0.97) !important; }

      .bg-slate-900              { background-color: var(--g-bg)       !important; }
      .bg-slate-800              { background-color: #0d1526           !important; }
      .bg-slate-700              { background-color: var(--g-surface)  !important; }
      [class*="bg-slate-9"], [class*="bg-zinc-9"], [class*="bg-gray-9"],
      [class*="bg-neutral-9"]    { background-color: var(--g-bg)       !important; }

      /* Colored section highlight blocks → surface */
      .bg-orange-50, .bg-emerald-50, .bg-cyan-50, .bg-sky-50,
      .bg-emerald-100, .bg-orange-100, .bg-cyan-100, .bg-sky-100,
      .bg-green-50, .bg-green-100, .bg-teal-50, .bg-teal-100 {
        background-color: var(--g-card) !important;
      }
      .bg-white\/70, [class*="bg-white/"]       { background-color: var(--g-card) !important; }
      [class*="overflow-x-auto"][class*="bg-white"] { background-color: var(--g-surface) !important; }
      [class*="from-orange-200"], [class*="via-white"] { background: transparent !important; }
      [class*="bg-slate-100"][class*="rounded"]  { background-color: var(--g-surface) !important; }

      /* Gradient from-* overrides */
      .from-slate-50, [class*="from-slate-50"] { --tw-gradient-from: var(--g-surface) !important; }
      [class*="from-white"]                    { --tw-gradient-from: var(--g-card)    !important; }

      /* ===== Nav / header — always-visible bottom rule ===== */
      nav, header {
        background-color: rgba(11,17,32,0.96) !important;
        border-color: var(--g-border) !important;
        border-bottom: 1px solid var(--g-border) !important;
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
      }

      /* ===== Feature / reveal cards — left accent border on hover ===== */
      [data-reveal-card] {
        background-color: var(--g-card)   !important;
        border-color:     var(--g-border) !important;
        border-left-width: 3px !important;
        border-left-color: transparent !important;
        transition: border-left-color 0.25s, box-shadow 0.25s !important;
      }
      [data-reveal-card]:hover {
        border-left-color: var(--g-accent) !important;
        box-shadow: 0 28px 55px -28px rgba(16,185,129,0.22) !important;
      }

      /* ===== Border overrides ===== */
      .border-slate-200                          { border-color: var(--g-border) !important; }
      .border-slate-300                          { border-color: #334155         !important; }
      .border-cyan-200, .border-orange-200,
      .border-emerald-200                        { border-color: var(--g-border) !important; }
      .bg-slate-300\/70, [class*="bg-slate-300"] { background-color: var(--g-border) !important; }

      /* ===== Shadow override ===== */
      .shadow-\[0_20px_45px_-30px_rgba\(15\,23\,42\,0\.35\)\] {
        box-shadow: 0 20px 45px -30px rgba(16,185,129,0.12) !important;
      }

      /* ===== Input fields ===== */
      input, textarea, select {
        background-color: var(--g-surface) !important;
        color: var(--g-text)              !important;
        border-color: var(--g-border)     !important;
      }
      input::placeholder, textarea::placeholder { color: var(--g-text-mute) !important; }

      /* ===== Text hierarchy — clear and readable ===== */
      #root .text-slate-900,
      :root[data-theme="dark"] .force-light-landing .text-slate-900 { color: var(--g-text)     !important; }
      #root .text-slate-800                                          { color: var(--g-text)     !important; }
      #root .text-slate-700,
      :root[data-theme="dark"] .force-light-landing .text-slate-700 { color: var(--g-text-sub) !important; }
      #root .text-slate-600,
      #root .text-slate-500,
      #root .text-slate-400,
      :root[data-theme="dark"] .force-light-landing .text-slate-600,
      :root[data-theme="dark"] .force-light-landing .text-slate-500,
      :root[data-theme="dark"] .force-light-landing .text-slate-400 { color: var(--g-text-mute) !important; }

      /* Colored text → white for readability on dark cards */
      [class*="text-orange-"], [class*="text-emerald-"],
      [class*="text-cyan-"], [class*="text-green-"],
      [class*="text-teal-"], [class*="text-sky-"]                    { color: var(--g-text) !important; }
      .text-orange-800, .text-emerald-800, .text-cyan-800,
      .text-orange-700, .text-emerald-700, .text-cyan-700            { color: var(--g-text) !important; }
      .text-orange-700 { color: var(--g-text) !important; }
      .text-cyan-800   { color: var(--g-text) !important; }

      /* CTA links */
      a[href*="goodydemo.vercel.app"], a[href*="calendly"] { color: #6ee7b7 !important; }

      /* ===== Body copy ===== */
      #root p      { color: var(--g-text-sub); }
      #root span   { color: var(--g-text-sub); }
      #root li     { color: var(--g-text-sub); }
      #root strong { color: var(--g-text);     }
      #root label  { color: var(--g-text-sub); }

      /* ===== Headings ===== */
      /* h1 — emerald gradient headline */
      #root h1 {
        background: linear-gradient(135deg, #6ee7b7 0%, #10b981 45%, #f1f5f9 100%) !important;
        -webkit-background-clip: text !important;
        background-clip: text !important;
        -webkit-text-fill-color: transparent !important;
        color: transparent !important;
      }
      /* h2, h3 — plain bright white */
      #root h2, #root h3 {
        background: none !important;
        -webkit-text-fill-color: var(--g-text) !important;
        color: var(--g-text) !important;
      }
      [class*="from-red"] h2, [class*="from-orange"] h2,
      [class*="from-emerald"] h2, [class*="from-blue"] h2,
      [class*="from-violet"] h2, [class*="from-slate"] h2,
      [class*="from-sky"] h2, [class*="from-amber"] h2 {
        background: none !important;
        -webkit-text-fill-color: var(--g-text) !important;
        color: var(--g-text) !important;
      }
      [data-reveal-card] h3 {
        background: none !important;
        -webkit-text-fill-color: var(--g-text) !important;
        color: var(--g-text) !important;
      }

      /* ===== Hero radial glow behind headline ===== */
      #root h1 {
        position: relative;
      }
      #root h1::before {
        content: '';
        position: absolute;
        inset: -60px -80px;
        background: radial-gradient(ellipse at 50% 50%, rgba(16,185,129,0.13) 0%, transparent 70%);
        pointer-events: none;
        z-index: -1;
        border-radius: 50%;
      }

      /* ===== Stats numbers — emerald pop ===== */
      .goody-stat-num {
        display: block;
        font-size: 52px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #6ee7b7 0%, #10b981 60%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .goody-stat-label {
        display: block;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--g-text-mute);
        margin-top: 4px;
      }
      .goody-stat-wrap {
        text-align: center;
        padding: 8px 0;
      }

      /* ===== Trusted-by marquee container ===== */
      .goody-marquee-outer {
        overflow: hidden;
        position: relative;
        mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
        -webkit-mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
      }
      .goody-marquee-track {
        display: flex;
        width: max-content;
        animation: goody-marquee 28s linear infinite;
      }
      .goody-marquee-track:hover { animation-play-state: paused; }
      .goody-marquee-item {
        white-space: nowrap;
        padding: 0 32px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--g-text-mute);
      }
      .goody-marquee-item::after {
        content: '·';
        margin-left: 32px;
        color: var(--g-accent);
        opacity: 0.6;
      }

      /* ===== Before / After metric colors ===== */
      .goody-before-val { color: #f87171 !important; font-weight: 800 !important; }
      .goody-after-val  { color: #6ee7b7 !important; font-weight: 800 !important; }

      /* ===== Comparison table — Goody column highlight ===== */
      .goody-col-goody {
        background: rgba(16,185,129,0.07) !important;
        border-left: 2px solid rgba(16,185,129,0.45) !important;
        border-right: 2px solid rgba(16,185,129,0.45) !important;
      }
      .goody-col-goody * { color: var(--g-text) !important; }
      .goody-col-typical * { color: var(--g-text-mute) !important; }

      /* ===== Amber / timer badges =====
      #root .bg-amber-50     { background-color: #1c1a0d     !important; }
      #root .text-amber-800  { color: var(--g-amber)         !important; }
      #root .border-amber-200 { border-color: rgba(251,191,36,0.3) !important; }

      /* ===== Testimonial cards — white text + styled role/country pills ===== */
      /* Card wrapper text */
      #root [class*="testimonial"],
      #root [class*="review"],
      #root [class*="quote"] { color: var(--g-text) !important; }

      /* Quote body text — full white */
      #root blockquote p,
      #root blockquote,
      #root [class*="italic"],
      #root [class*="font-medium"] { color: var(--g-text) !important; }

      /* Reviewer name */
      #root [class*="font-bold"],
      #root [class*="font-semibold"] { color: var(--g-text) !important; }

      /* Location / sub-label text */
      #root [class*="text-xs"],
      #root [class*="tracking-wide"] { color: var(--g-text-sub) !important; }

      /* ---- Role pills (outlined — e.g. FLOOR TEAM, SUPERMARKET) ---- */
      /* These are typically rounded-full with a light bg + border */
      #root [class*="rounded-full"][class*="border"],
      #root [class*="rounded-full"][class*="bg-slate"],
      #root [class*="rounded-full"][class*="bg-white"],
      #root [class*="rounded-full"][class*="bg-gray"] {
        background-color: transparent !important;
        border: 1.5px solid rgba(255,255,255,0.55) !important;
        color: #ffffff !important;
      }

      /* ---- Country pills (solid — e.g. GHA, UAE, USA) ---- */
      /* Darker / smaller pills that sit beside the role badge */
      #root [class*="rounded-full"][class*="bg-slate-700"],
      #root [class*="rounded-full"][class*="bg-slate-800"],
      #root [class*="rounded-full"][class*="bg-slate-900"],
      #root [class*="rounded-full"][class*="bg-zinc"],
      #root [class*="rounded-full"][class*="bg-gray-7"],
      #root [class*="rounded-full"][class*="bg-gray-8"],
      #root [class*="rounded-full"][class*="bg-gray-9"] {
        background-color: var(--g-accent) !important;
        border: none !important;
        color: #ffffff !important;
      }

      /* Ensure all text inside any rounded-full pill is white */
      #root [class*="rounded-full"] span,
      #root [class*="rounded-full"] { color: #ffffff !important; }

      /* ---- Result banner (e.g. "CHECKOUT FLOW IMPROVED IN FIRST WEEK.") ---- */
      #root [class*="bg-slate"][class*="rounded"] p,
      #root [class*="bg-slate"][class*="rounded"] span {
        color: #ffffff !important;
      }

      /* ---- General: force all <p> <span> <li> inside cards white ---- */
      #root [class*="rounded-"][class*="border"] p,
      #root [class*="rounded-"][class*="border"] span,
      #root [class*="rounded-"][class*="border"] li,
      #root [class*="rounded-"][class*="border"] strong {
        color: var(--g-text) !important;
      }

      /* ===================================================================
         GOODY CUSTOM COMPONENTS
         =================================================================== */

      /* ----- Fixed pricing tag (bottom-right) ----- */
      .goody-pricing-tag {
        position: fixed;
        right: 12px;
        bottom: 14px;
        z-index: 90;
        width: min(320px, calc(100vw - 24px));
        border-radius: 16px;
        border: 1px solid rgba(16,185,129,0.35);
        background: linear-gradient(140deg, rgba(11,17,32,0.97), rgba(20,29,46,0.96));
        color: var(--g-text);
        box-shadow: 0 20px 40px -26px rgba(2,6,23,0.95);
        backdrop-filter: blur(12px);
      }

      .goody-pricing-tag__inner { padding: 12px 14px; }

      .goody-pricing-tag__eyebrow {
        margin: 0;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--g-accent);
      }

      .goody-pricing-tag__line {
        margin: 6px 0 0;
        font-size: 13px;
        line-height: 1.35;
        font-weight: 700;
        color: var(--g-text);
      }

      .goody-pricing-tag__line strong {
        color: #6ee7b7;
        font-size: 15px;
      }

      .goody-pricing-tag__note {
        margin: 8px 0 0;
        font-size: 11px;
        line-height: 1.35;
        color: var(--g-text-mute);
      }

      @media (max-width: 640px) {
        .goody-pricing-tag { bottom: 84px; }
      }

      /* ----- Sales command center section ----- */
      .goody-enhancements {
        margin: 48px 0 28px;
        border: 1px solid var(--g-border);
        border-radius: 24px;
        background: var(--g-surface);
        box-shadow: 0 20px 40px -34px rgba(16,185,129,0.1);
        padding: 22px;
      }

      .goody-enhancements h3 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
        color: var(--g-text);
      }

      .goody-enhancements p {
        margin: 0;
        color: var(--g-text-mute);
      }

      /* ----- Grid layout ----- */
      .goody-grid { display: grid; gap: 12px; }
      .goody-grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .goody-grid.cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .goody-grid.cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

      /* ----- Cards ----- */
      .goody-card {
        border: 1px solid var(--g-border);
        background: var(--g-card);
        border-radius: 16px;
        padding: 14px;
        transition: border-color 0.2s;
      }
      .goody-card:hover { border-color: rgba(16,185,129,0.4); }

      .goody-card h4 {
        margin: 0;
        font-size: 14px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--g-accent);
        -webkit-text-fill-color: var(--g-accent);
        background: none;
      }

      .goody-card p {
        margin: 8px 0 0;
        font-size: 14px;
        line-height: 1.5;
        color: var(--g-text-sub);
      }

      /* ----- Price display ----- */
      .goody-price {
        margin-top: 6px;
        font-size: 28px;
        font-weight: 900;
        color: var(--g-accent);
      }

      /* ----- Offer countdown pill ----- */
      .goody-offer-countdown {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        border: 1px solid rgba(16,185,129,0.4);

      (function () {
        var projectBase = '/goodyapps/';

        function routeToProjectHome(event) {
          var target = event.target;
          if (!target || !target.closest) return;

          var homeLink = target.closest('a[aria-label="Go to home"]');
          if (!homeLink) return;

          event.preventDefault();
          if (window.location.pathname.indexOf(projectBase) === 0) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
          }
          window.location.assign(projectBase);
        }

        function patchHomeLinks() {
          var links = document.querySelectorAll('a[aria-label="Go to home"]');
          if (!links.length) return;

          links.forEach(function (link) {
            link.setAttribute('href', projectBase);
          });
        }

        function setupObservers() {
          var root = document.getElementById('root');
          if (!root || typeof MutationObserver === 'undefined') return;

          var observer = new MutationObserver(function () {
            patchHomeLinks();
          });

          observer.observe(root, { childList: true, subtree: true });
        }

        document.addEventListener('click', routeToProjectHome, true);
        patchHomeLinks();
        setupObservers();

        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', patchHomeLinks);
        } else {
          patchHomeLinks();
        }
      })();

        function injectPriceHeroBanner() {
          if (document.getElementById('goody-hero-price-banner')) {

        function loadAnalytics() {
          try {
            return JSON.parse(localStorage.getItem(analyticsKey) || '{}');
          } catch (_error) {
            return {};
          }
        }

        function saveAnalytics(state) {
          localStorage.setItem(analyticsKey, JSON.stringify(state));
        }

        function renderAnalytics() {
          var state = loadAnalytics();
          var keys = ['demo', 'book', 'whatsapp', 'pricing', 'checklist'];
          keys.forEach(function (key) {
            var el = document.getElementById('ga-' + key);
            if (el) {
              el.textContent = String(state[key] || 0);
            }
          });
        }

        function track(type) {
          var state = loadAnalytics();
          state[type] = (state[type] || 0) + 1;
          saveAnalytics(state);
          renderAnalytics();
        }

        function setupTracking() {
          document.addEventListener('click', function (event) {
            var el = event.target && event.target.closest ? event.target.closest('[data-track], a, button, .goody-pricing-tag') : null;
            if (!el) return;

            if (el.classList && el.classList.contains('goody-pricing-tag')) {
              track('pricing');
              return;
            }

            var explicit = el.getAttribute && el.getAttribute('data-track');
            if (explicit) {
              track(explicit);
              return;
            }

            if (el.matches && el.matches('a[href*="goodydemo.vercel.app/login"]')) track('demo');
            if (el.matches && el.matches('a[href*="calendly.com"]')) track('book');
            if (el.matches && el.matches('a[href*="wa.me"], a[href*="whatsapp"]')) track('whatsapp');
            if (el.id === 'goody-download-checklist') track('checklist');

        function setupROICalculator() {
          var tx = document.getElementById('goody-roi-transactions');
          var basket = document.getElementById('goody-roi-basket');
          var output = document.getElementById('goody-roi-output');
          if (!tx || !basket || !output) return;

          var compute = function () {
            var t = Math.max(1, Number(tx.value) || 0);
            var b = Math.max(1, Number(basket.value) || 0);
            var monthlyHoursSaved = ((t * 2.58 * 30) / 60);
            var monthlyRevenueLift = (t * b * 30 * 0.06);
            output.textContent = 'Estimated monthly value: ' + Math.round(monthlyHoursSaved) + ' staff-hours saved and about $' + Math.round(monthlyRevenueLift).toLocaleString() + ' potential revenue lift.';
          };

          tx.addEventListener('input', compute);
          basket.addEventListener('input', compute);
          compute();
        }

        function setupStorePaths() {
          var buttons = document.querySelectorAll('[data-store-path]');
          if (!buttons.length) return;
          var note = document.getElementById('goody-path-note');

          var presets = {
            supermarket: { query: 'inventory', label: 'Supermarket path selected: inventory and transfer controls highlighted.' },
            gadget: { query: 'smart retail', label: 'Gadget store path selected: smart retail + approval safeguards highlighted.' },

          };

          buttons.forEach(function (button) {
            button.addEventListener('click', function () {
              var key = button.getAttribute('data-store-path');
              var preset = presets[key];
              if (!preset) return;

              var search = document.getElementById('feature-search');
              if (search) {
                search.value = preset.query;
                search.dispatchEvent(new Event('input', { bubbles: true }));
              }

              if (note) note.textContent = preset.label;
              var target = document.getElementById('features');
              if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
          });
        }

        function setupChecklistDownload() {
          var btn = document.getElementById('goody-download-checklist');
          if (!btn) return;

          btn.addEventListener('click', function () {
            var checklist = [
              'Goody POS Switch Checklist',
              '',
              '- Export product catalog from current system',
              '- Confirm staff role list and permission levels',
              '- Prepare payment method mapping',
              '- Validate printer and barcode setup',
              '- Set onboarding date and first-week support owner',
              '- Run demo walkthrough before go-live'
            ].join('\n');

            var blob = new Blob([checklist], { type: 'text/plain' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'goody-pos-switch-checklist.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          });
        }

        function startOfferCountdown() {
          var el = document.getElementById('goody-offer-countdown');
          if (!el) return;

          var tick = function () {
            var diff = Math.max(0, offerDeadline - Date.now());
            var d = Math.floor(diff / (24 * 60 * 60 * 1000));
            var h = Math.floor((diff % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
            var m = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));
            el.textContent = 'Offer ends in ' + d + 'd ' + h + 'h ' + m + 'm';
          };

          tick();
          setInterval(tick, 60000);
        }

        ready(function () {
          var attempts = 0;
          var maxAttempts = 60;
          var interval = setInterval(function () {
            attempts += 1;
            var mounted = insertEnhancements();
            var bannerMounted = injectPriceHeroBanner();
            if ((!mounted || !bannerMounted) && attempts < maxAttempts) {
              return;
            }

            clearInterval(interval);
            if (!mounted) {
              return;
            }

            setupTracking();
            renderAnalytics();
            setupROICalculator();
            setupStorePaths();
            setupChecklistDownload();
            startOfferCountdown();
          }, 250);
        });
      })();

            var text = el.innerText || '';
            if (
              text.indexOf('NORTHLANE') !== -1 ||
              text.indexOf('URBANCART') !== -1 ||
              text.indexOf('BLUESHELF') !== -1
            ) {
              /* Walk up to find the closest container that wraps just the brand list */
              var found = el;
              /* Prefer a direct child that is the brand list row */
              var rows = el.querySelectorAll('div, p, span');
              for (var r = 0; r < rows.length; r++) {
                if ((rows[r].innerText || '').indexOf('NORTHLANE') !== -1) {
                  found = rows[r]; break;
                }
              }
              strip = found;
              break;
            }
          }
          if (!strip) return false;
          /* Already wrapped? */
          if (strip.closest('.goody-marquee-outer')) return true;

          /* Collect brand names */
          var brands = [];
          var children = strip.childNodes;
          for (var c = 0; c < children.length; c++) {
            var t = (children[c].innerText || children[c].textContent || '').trim();
            if (t.length > 1) brands.push(t);
          }
          if (!brands.length) {
            var fullText = (strip.innerText || strip.textContent || '');
            brands = fullText.split(/[·•\|\n]+/).map(function(s){ return s.trim(); }).filter(Boolean);
          }
          if (!brands.length) return false;

          /* Build marquee — duplicate for seamless loop */
          var allBrands = brands.concat(brands);
          var outer = document.createElement('div');
          outer.id = 'goody-marquee';
          outer.className = 'goody-marquee-outer';
          var track = document.createElement('div');
          track.className = 'goody-marquee-track';
          allBrands.forEach(function(b) {
            var item = document.createElement('span');
            item.className = 'goody-marquee-item';
            item.textContent = b;
            track.appendChild(item);
          });
          outer.appendChild(track);
          strip.parentNode.insertBefore(outer, strip);
          strip.style.display = 'none';
          return true;
        }

        /* ---- 2. Stats numbers emerald pop ---- */
        function styleStats() {
          if (document.getElementById('goody-stats-styled')) return true;
          /* Stats blocks: look for elements containing "30+" or "80+" or "Yes" as standalone prominent text */
          var allEls = document.querySelectorAll('p, span, div, h2, h3, h4');
          var statPatterns = [
            { pattern: /^30\+$/, label: 'Business-Ready Modules' },
            { pattern: /^80\+$/, label: 'Core Features' },
            { pattern: /^Yes$/, label: 'Offline-Capable' },
            { pattern: /^2$/, label: 'Built-In Business Modes' },
            { pattern: /^6$/, label: 'Role-Based Access Levels' },
            { pattern: /^60m$/, label: 'Demo Reset Interval' }
          ];
          var matched = 0;
          for (var i = 0; i < allEls.length; i++) {
            var el = allEls[i];
            var txt = (el.innerText || el.textContent || '').trim();
            for (var s = 0; s < statPatterns.length; s++) {
              if (statPatterns[s].pattern.test(txt) && !el.classList.contains('goody-stat-num')) {
                el.classList.add('goody-stat-num');
                matched++;
                break;
              }
            }
          }
          if (matched > 0) {
            var marker = document.createElement('span');
            marker.id = 'goody-stats-styled';
            marker.style.display = 'none';
            document.body.appendChild(marker);
            return true;
          }
          return false;
        }

        /* ---- 3. Before / After metric color coding ---- */
        function colorBeforeAfter() {
          if (document.getElementById('goody-ba-styled')) return true;
          var allEls = document.querySelectorAll('p, span, li, td, div');
          var colored = 0;
          for (var i = 0; i < allEls.length; i++) {
            var el = allEls[i];
            /* Skip if it has child elements — only leaf nodes */
            if (el.children.length > 0) continue;
            var txt = el.textContent || '';
            if (/^Before:/i.test(txt.trim())) {
              el.classList.add('goody-before-val');
              colored++;
            } else if (/^After:/i.test(txt.trim())) {
              el.classList.add('goody-after-val');
              colored++;
            }
          }
          if (colored > 0) {
            var marker = document.createElement('span');
            marker.id = 'goody-ba-styled';
            marker.style.display = 'none';
            document.body.appendChild(marker);
            return true;
          }
          return false;
        }

        /* ---- 4. Comparison table column highlight ---- */
        function styleComparisonTable() {
          if (document.getElementById('goody-table-styled')) return true;
          /* Find table or grid that contains both "GOODY POS" and "TYPICAL POS" */
          var candidates = document.querySelectorAll('table, [class*="grid"], [class*="table"]');
          var table = null;
          for (var i = 0; i < candidates.length; i++) {
            var txt = candidates[i].innerText || '';
            if (txt.indexOf('GOODY POS') !== -1 && (txt.indexOf('TYPICAL POS') !== -1 || txt.indexOf('typical') !== -1)) {
              table = candidates[i];
              break;
            }
          }
          if (!table) {
            /* fallback: scan divs */
            var divs = document.querySelectorAll('section div, section');
            for (var d = 0; d < divs.length; d++) {
              var dt = divs[d].innerText || '';
              if (dt.indexOf('GOODY POS') !== -1 && dt.indexOf('TYPICAL') !== -1) {
                table = divs[d]; break;
              }
            }
          }
          if (!table) return false;

          /* Find column cells under "GOODY POS" header */
          var allCells = table.querySelectorAll('td, th, [class*="col"], [class*="cell"]');
          if (!allCells.length) {
            /* grid rows approach */
            allCells = table.children;
          }
          /* Try to identify which column index is Goody */
          var headers = table.querySelectorAll('th, [class*="header"] > *, [class*="thead"] > *');
          var goodyColIdx = -1;
          headers.forEach(function(h, idx) {
            if ((h.innerText || '').indexOf('GOODY') !== -1) goodyColIdx = idx;
          });

          /* Simpler: find any cell/div whose direct text contains GOODY POS and add class to its column siblings */
          var allDivs = table.querySelectorAll('div, td, p, span');
          for (var j = 0; j < allDivs.length; j++) {
            var cellTxt = (allDivs[j].innerText || allDivs[j].textContent || '').trim();
            if (cellTxt === 'GOODY POS') {
              /* Walk up to row/col container and mark it */
              var parent = allDivs[j].parentElement;
              if (parent) {
                parent.classList.add('goody-col-goody');
                /* Also mark all siblings in same column position if it's a grid */
                var grandparent = parent.parentElement;
                if (grandparent) {
                  var siblings = grandparent.children;
                  var idx = Array.prototype.indexOf.call(siblings, parent);
                  /* Mark all rows' same-index child */
                  var rows = grandparent.parentElement ? grandparent.parentElement.children : [];
                  for (var rr = 0; rr < rows.length; rr++) {
                    if (rows[rr].children[idx]) {
                      rows[rr].children[idx].classList.add('goody-col-goody');
                    }
                  }
                }
              }
            }
            if (cellTxt === 'TYPICAL POS') {
              var parent2 = allDivs[j].parentElement;
              if (parent2) parent2.classList.add('goody-col-typical');
            }
          }

          var marker = document.createElement('span');
          marker.id = 'goody-table-styled';
          marker.style.display = 'none';
          document.body.appendChild(marker);
          return true;
        }

        /* ---- Run all with retry ---- */
        ready(function () {
          var attempts = 0;
          var maxAttempts = 80;
          var done = { marquee: false, stats: false, ba: false, table: false };
          var interval = setInterval(function () {
            attempts++;
            if (!done.marquee) done.marquee = injectMarquee();
            if (!done.stats)   done.stats   = styleStats();
            if (!done.ba)      done.ba      = colorBeforeAfter();
            if (!done.table)   done.table   = styleComparisonTable();
            var allDone = done.marquee && done.stats && done.ba && done.table;
            if (allDone || attempts >= maxAttempts) clearInterval(interval);
          }, 300);
        });
      })();
    </script>
  </body>
</html>
